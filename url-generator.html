<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Generator - Wedding Invitation</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 800px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        input[type="text"],
        textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 150px;
            font-family: monospace;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .output-section {
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .output-box {
            background: #f8f9fa;
            border: 2px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-top: 10px;
            word-break: break-all;
            font-family: monospace;
            font-size: 12px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .guest-list {
            margin-top: 15px;
        }

        .guest-item {
            background: #f8f9fa;
            padding: 10px 15px;
            border-radius: 6px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .guest-name {
            font-weight: 600;
            color: #333;
        }

        .copy-btn-small {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
        }

        .stats {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .stat-item {
            flex: 1;
        }

        .stat-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🎉 Wedding Invitation URL Generator</h1>
        <p class="subtitle">YOPI JANUARDI & REZA LESTARI - 29 Desember 2025</p>

        <div class="stats" id="stats">
            <div class="stat-item">
                <div class="stat-number" id="totalGuests">0</div>
                <div class="stat-label">Total Tamu</div>
            </div>
            <div class="stat-item">
                <div class="stat-number" id="generatedUrls">0</div>
                <div class="stat-label">URL Generated</div>
            </div>
        </div>

        <!-- Single URL Generator -->
        <div class="form-group">
            <label for="baseUrl">Base URL:</label>
            <input type="text" id="baseUrl" value="https://raz.my.id/yopireza/index.html"
                placeholder="https://example.com/index.html">
        </div>

        <div class="form-group">
            <label for="guestName">Nama Tamu:</label>
            <input type="text" id="guestName" placeholder="Contoh: Bapak Ahmad dan Keluarga">
        </div>

        <button onclick="generateSingleURL()">Generate URL</button>

        <div class="output-section" id="singleOutput" style="display:none;">
            <h3>Generated URL:</h3>
            <div class="output-box" id="singleUrl"></div>
            <div class="button-group">
                <button onclick="copySingleURL()">📋 Copy URL</button>
                <button onclick="openSingleURL()">🔗 Open in New Tab</button>
            </div>
            <div class="success-message" id="successMessage">✅ URL berhasil dicopy ke clipboard!</div>
        </div>

        <hr style="margin: 40px 0; border: none; border-top: 2px solid #f0f0f0;">

        <!-- Bulk URL Generator -->
        <h3>Bulk URL Generator</h3>
        <div class="form-group">
            <label for="guestList">Daftar Nama Tamu (satu nama per baris):</label>
            <textarea id="guestList" placeholder="Bapak Ahmad dan Keluarga
Ibu Siti
Bapak H. Rahman & Keluarga
Dr. Budi Santoso, M.Sc.
Keluarga Besar Pak Hasan"></textarea>
        </div>

        <button onclick="generateBulkURLs()">Generate All URLs</button>

        <div class="output-section" id="bulkOutput" style="display:none;">
            <h3>Generated URLs:</h3>
            <div class="guest-list" id="guestListOutput"></div>
            <div class="button-group">
                <button onclick="copyAllURLs()">📋 Copy All URLs</button>
                <button onclick="downloadCSV()">📥 Download CSV</button>
            </div>
            <div class="success-message" id="bulkSuccessMessage">✅ Semua URL berhasil dicopy!</div>
        </div>
    </div>

    <script>
        let generatedURLs = [];

        function generateSingleURL() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const guestName = document.getElementById('guestName').value.trim();

            if (!baseUrl || !guestName) {
                alert('Please fill in both Base URL and Guest Name');
                return;
            }

            const url = baseUrl + '?nama=' + encodeURIComponent(guestName);
            document.getElementById('singleUrl').textContent = url;
            document.getElementById('singleOutput').style.display = 'block';

            updateStats();
        }

        function copySingleURL() {
            const url = document.getElementById('singleUrl').textContent;
            navigator.clipboard.writeText(url).then(() => {
                const msg = document.getElementById('successMessage');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000);
            });
        }

        function openSingleURL() {
            const url = document.getElementById('singleUrl').textContent;
            window.open(url, '_blank');
        }

        function generateBulkURLs() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const guestListText = document.getElementById('guestList').value.trim();

            if (!baseUrl || !guestListText) {
                alert('Please fill in both Base URL and Guest List');
                return;
            }

            const guests = guestListText.split('\n').filter(name => name.trim() !== '');
            generatedURLs = [];

            const outputHtml = guests.map((guest, index) => {
                const url = baseUrl + '?nama=' + encodeURIComponent(guest.trim());
                generatedURLs.push({ name: guest.trim(), url });

                return `
                    <div class="guest-item">
                        <span class="guest-name">${index + 1}. ${guest.trim()}</span>
                        <button class="copy-btn-small" onclick="copyURL('${url.replace(/'/g, "\\'")}')">Copy</button>
                    </div>
                `;
            }).join('');

            document.getElementById('guestListOutput').innerHTML = outputHtml;
            document.getElementById('bulkOutput').style.display = 'block';

            updateStats(guests.length, generatedURLs.length);
        }

        function copyURL(url) {
            navigator.clipboard.writeText(url);
        }

        function copyAllURLs() {
            const allUrls = generatedURLs.map(item => item.url).join('\n');
            navigator.clipboard.writeText(allUrls).then(() => {
                const msg = document.getElementById('bulkSuccessMessage');
                msg.style.display = 'block';
                setTimeout(() => msg.style.display = 'none', 3000);
            });
        }

        function downloadCSV() {
            const csvContent = 'Nama Tamu,URL\n' +
                generatedURLs.map(item => `"${item.name}","${item.url}"`).join('\n');

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'wedding-invitation-urls.csv';
            link.click();
        }

        function updateStats(totalGuests = 0, generated = 0) {
            document.getElementById('totalGuests').textContent = totalGuests;
            document.getElementById('generatedUrls').textContent = generated;
        }
    </script>
</body>

</html>
